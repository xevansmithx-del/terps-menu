<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orders · Terps Budtender</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="img/icon-32.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green-900:#0b2e22;--green-800:#0e3b2e;--green-700:#124a39;--gold:#e8b54b;--teal:#3e9b96;--coral:#ee4b3b;--cream:#f6f2e9;--paper:#fffdf8;--ink:#14201b;--muted:#6b776f;--line:#e2dccd;--sans:"Manrope",-apple-system,sans-serif;--serif:"Fraunces",Georgia,serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
a{color:inherit}
header{background:var(--green-900);color:var(--cream);display:flex;align-items:center;gap:16px;padding:0 18px;height:60px;flex-shrink:0}
header img{height:26px;filter:brightness(0) invert(1)}
header .t{font-family:var(--serif);font-size:1.15rem}
header .badges{display:flex;gap:8px;margin-left:8px}
header .b{font-size:.78rem;font-weight:800;padding:.3em .7em;border-radius:999px;display:flex;gap:.4em;align-items:center;background:rgba(255,255,255,.08)}
header .b .dot{width:8px;height:8px;border-radius:50%}
header .spacer{flex:1}
header .ctl{font-size:.82rem;font-weight:700;color:#bcd0c2;display:flex;align-items:center;gap:8px}
header .toggle{background:var(--teal);color:#fff;border:none;padding:.5em 1em;border-radius:999px;font-weight:800;font-size:.8rem;cursor:pointer}
.wrap{flex:1;display:grid;grid-template-columns:400px 1fr;overflow:hidden}
.queue{border-right:1px solid var(--line);display:flex;flex-direction:column;background:var(--cream);overflow:hidden}
.tabs{display:flex;gap:4px;padding:12px 12px 8px;flex-wrap:wrap}
.tab{font-weight:800;font-size:.82rem;padding:.5em .9em;border-radius:999px;border:1.5px solid var(--line);background:var(--paper);cursor:pointer;color:var(--green-800)}
.tab.active{background:var(--green-800);color:var(--cream);border-color:var(--green-800)}
.tab .c{opacity:.7;margin-left:.3em}
.list{flex:1;overflow:auto;padding:4px 12px 16px}
.ocard{background:var(--paper);border:1px solid var(--line);border-left:5px solid var(--muted);border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:.12s}
.ocard:hover{box-shadow:0 6px 18px rgba(11,46,34,.1);transform:translateY(-1px)}
.ocard.sel{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold)}
.ocard .r1{display:flex;justify-content:space-between;align-items:baseline}
.ocard .id{font-weight:800;font-size:.95rem}
.ocard .ago{font-size:.75rem;color:var(--muted)}
.ocard .nm{font-weight:700;margin-top:2px}
.ocard .r2{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.ocard .meta{font-size:.8rem;color:var(--muted)}
.ocard .pill{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:.28em .6em;border-radius:999px;color:#fff}
.ocard.flash{animation:flash 1.2s ease}
@keyframes flash{0%,100%{background:var(--paper)}30%{background:#fff3d6}}
.detail{overflow:auto;padding:26px 30px;background:var(--cream)}
.empty{height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:1rem;text-align:center}
.dhead{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.dhead h1{font-family:var(--serif);font-size:1.9rem;color:var(--green-900)}
.dhead .sub{color:var(--muted);font-size:.9rem;margin-top:2px}
.statuspill{font-size:.8rem;font-weight:800;color:#fff;padding:.4em .9em;border-radius:999px;text-transform:uppercase;letter-spacing:.04em}
.cust{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:20px 0}
.cust .row{display:flex;gap:10px;padding:5px 0;font-size:.95rem}
.cust .row b{min-width:70px;color:var(--muted);font-weight:700}
.cust a{color:var(--teal);font-weight:700}
.items{background:var(--paper);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:20px}
.items .ih{display:grid;grid-template-columns:1fr 70px 90px;gap:10px;padding:12px 18px;background:var(--green-900);color:#cfe0d4;font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em}
.items .it{display:grid;grid-template-columns:1fr 70px 90px;gap:10px;padding:14px 18px;border-top:1px solid var(--line);align-items:center}
.items .it .nm{font-weight:800}
.items .it .st{font-size:.82rem;color:var(--teal);font-weight:700}
.items .it .q{font-weight:800;text-align:center}
.items .it .pr{font-weight:800;text-align:right;font-family:var(--serif)}
.items .tot{display:flex;justify-content:space-between;padding:14px 18px;border-top:2px solid var(--line);font-weight:800;font-size:1.1rem}
.actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center;position:sticky;bottom:0;background:linear-gradient(transparent,var(--cream) 30%);padding:16px 0}
.bigbtn{flex:1;min-width:220px;border:none;border-radius:14px;padding:1.1em;font-family:var(--sans);font-weight:800;font-size:1.15rem;color:#fff;cursor:pointer;transition:.15s}
.bigbtn:hover{filter:brightness(1.06);transform:translateY(-1px)}
.bigbtn.done{background:var(--green-700)}
.cancel{background:none;border:1.5px solid var(--line);color:var(--muted);border-radius:14px;padding:1.1em 1.3em;font-weight:700;cursor:pointer}
.notify{font-size:.82rem;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:6px}
.timeline{margin-top:22px;border-top:1px solid var(--line);padding-top:16px}
.timeline h4{font-size:.78rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:10px}
.tl{display:flex;gap:10px;align-items:center;font-size:.85rem;padding:3px 0}
.tl .d{width:10px;height:10px;border-radius:50%}
.tl .tm{color:var(--muted);margin-left:auto}
.demoflag{background:var(--gold);color:var(--green-900);text-align:center;font-size:.78rem;font-weight:800;padding:5px}
@media(max-width:820px){.wrap{grid-template-columns:1fr}.detail{display:none}.detail.show{display:block;position:fixed;inset:60px 0 0;z-index:20}}
</style></head><body>
<div class="demoflag" id="demoflag">DEMO MODE — sample orders. Connect the Google backend to go live (see setup guide).</div>
<header>
  <img src="img/logo_horizontal.png" alt="Terps">
  <span class="t">Orders</span>
  <div class="badges" id="badges"></div>
  <div class="spacer"></div>
  <span class="ctl"><span id="clock"></span> · auto-refresh</span>
  <button class="toggle" id="accepting">🟢 Accepting orders</button>
</header>
<div class="wrap">
  <div class="queue">
    <div class="tabs" id="tabs"></div>
    <div class="list" id="list"></div>
  </div>
  <div class="detail" id="detail"><div class="empty">Select an order to view details</div></div>
</div>
<audio id="ding" src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA="></audio>
<script src="js/orders.js"></script>
<script>
let activeTab="new", selId=null, known=new Set(), first=true;
const $=s=>document.querySelector(s);
const money=x=>"$"+Number(x).toFixed(2);
const ago=t=>{const m=Math.floor((Date.now()-t)/60000);return m<1?"just now":m<60?m+" min ago":Math.floor(m/60)+"h ago";};
function subtotal(o){return o.subtotal!=null?o.subtotal:(o.items||[]).reduce((s,i)=>s+i.price*i.qty,0);}
const NEXT={new:"preparing",preparing:"ready",ready:"completed"};
const NEXT_LABEL={new:"✓ Start preparing",preparing:"✓ Mark ready for pickup",ready:"✓ Complete order (picked up)"};

async function refresh(){
  const all=await Orders.list();
  // new-order alert
  all.forEach(o=>{ if(o.status==="new" && !known.has(o.id)){ if(!first){ try{$("#ding").play()}catch(e){} } } known.add(o.id); });
  first=false;
  renderBadges(all); renderTabs(all); renderList(all);
  if(selId){ const o=all.find(x=>x.id===selId); if(o) renderDetail(o); }
}
function renderBadges(all){
  const counts={}; STATUS_FLOW.forEach(s=>counts[s]=0); all.forEach(o=>counts[o.status]=(counts[o.status]||0)+1);
  $("#badges").innerHTML=STATUS_FLOW.filter(s=>s!=="completed").map(s=>`<span class="b"><span class="dot" style="background:${STATUS_COLOR[s]}"></span>${STATUS_LABEL[s]} ${counts[s]||0}</span>`).join("");
}
function renderTabs(all){
  const counts={}; all.forEach(o=>counts[o.status]=(counts[o.status]||0)+1);
  const tabs=[["new","New"],["preparing","Preparing"],["ready","Ready"],["completed","Done"]];
  $("#tabs").innerHTML=tabs.map(([k,l])=>`<button class="tab ${activeTab===k?'active':''}" onclick="activeTab='${k}';refresh()">${l}<span class="c">${counts[k]||0}</span></button>`).join("");
}
function renderList(all){
  const rows=all.filter(o=>o.status===activeTab);
  $("#list").innerHTML = rows.length ? rows.map(o=>`
    <div class="ocard ${selId===o.id?'sel':''}" style="border-left-color:${STATUS_COLOR[o.status]}" onclick="select('${o.id}')">
      <div class="r1"><span class="id">#${o.id}</span><span class="ago">${ago(o.createdAt)}</span></div>
      <div class="nm">${o.customer?.name||'Guest'}</div>
      <div class="r2"><span class="meta">${(o.items||[]).reduce((n,i)=>n+i.qty,0)} items · ${money(subtotal(o))}</span>
      <span class="pill" style="background:${STATUS_COLOR[o.status]}">${STATUS_LABEL[o.status]}</span></div>
    </div>`).join("") : `<div class="empty" style="padding:40px 0">No ${STATUS_LABEL[activeTab].toLowerCase()} orders.</div>`;
}
function renderDetail(o){
  const d=$("#detail"); d.classList.add("show");
  const items=(o.items||[]).map(i=>`<div class="it"><div><div class="nm">${i.name}</div>${i.strain?`<div class="st">${i.strain}</div>`:''}</div><div class="q">×${i.qty}</div><div class="pr">${money(i.price*i.qty)}</div></div>`).join("");
  const tl=(o.statusHistory||[]).map(h=>`<div class="tl"><span class="d" style="background:${STATUS_COLOR[h.status]}"></span>${STATUS_LABEL[h.status]}<span class="tm">${new Date(h.at).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}</span></div>`).join("");
  const nxt=NEXT[o.status];
  d.innerHTML=`
    <div class="dhead"><div><h1>#${o.id}</h1><div class="sub">Placed ${ago(o.createdAt)} · In-store pickup · Pay in store</div></div>
      <span class="statuspill" style="background:${STATUS_COLOR[o.status]}">${STATUS_LABEL[o.status]}</span></div>
    <div class="cust">
      <div class="row"><b>Customer</b> <span>${o.customer?.name||'Guest'}</span></div>
      <div class="row"><b>Phone</b> <a href="tel:${o.customer?.phone||''}">${o.customer?.phone||'—'}</a></div>
      <div class="row"><b>Email</b> <a href="mailto:${o.customer?.email||''}">${o.customer?.email||'—'}</a></div>
      <div class="row"><b>Pickup</b> <span>${o.pickupTime||'ASAP'}</span></div>
      ${o.notes?`<div class="row"><b>Notes</b> <span>${o.notes}</span></div>`:''}
    </div>
    <div class="items"><div class="ih"><span>Item</span><span style="text-align:center">Qty</span><span style="text-align:right">Total</span></div>
      ${items}<div class="tot"><span>Subtotal (pre-tax)</span><span>${money(subtotal(o))}</span></div></div>
    <div class="actions">
      ${nxt?`<button class="bigbtn" style="background:${STATUS_COLOR[nxt]}" onclick="advance('${o.id}','${nxt}')">${NEXT_LABEL[o.status]}</button>`:`<button class="bigbtn done" disabled>Order completed ✓</button>`}
      ${o.status!=='completed'&&o.status!=='canceled'?`<button class="cancel" onclick="advance('${o.id}','canceled')">Cancel</button>`:''}
    </div>
    ${nxt?`<div class="notify">🔔 Advancing will text + email ${o.customer?.name?.split(' ')[0]||'the customer'} an update (once backend is connected).</div>`:''}
    <div class="timeline"><h4>Order timeline</h4>${tl}</div>`;
}
window.select=id=>{selId=id;refresh();};
window.advance=async(id,status)=>{ await Orders.setStatus(id,status); if(status==='completed'||status==='canceled'){ if(activeTab==='new'||activeTab==='preparing'||activeTab==='ready'){} } refresh(); };
$("#accepting").onclick=function(){ this.textContent=this.textContent.includes("🟢")?"🔴 Paused":"🟢 Accepting orders"; };
setInterval(()=>{$("#clock").textContent=new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});},1000);
seedDemoOrders();
if(ORDERS_CFG.backendUrl) $("#demoflag").style.display="none";
refresh(); setInterval(refresh,5000);
</script></body></html>
