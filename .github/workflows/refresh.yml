name: Refresh Menu

# Keeps the published site in lockstep with the Weave POS with no human step:
# new products, removed/hidden products, price changes, and photos uploaded
# in Weave all flow through automatically.
on:
  schedule:
    # ~6:00 / ~12:00 / ~18:00 Mountain (MDT = UTC-6). GitHub cron is UTC.
    - cron: '0 0,12,18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: refresh-menu
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install --quiet pillow

      - name: Pull live Weave feed (fail-closed)
        run: cd _pipeline && python3 refresh_menu.py

      - name: Rebuild catalog
        run: cd _pipeline && python3 build_catalog.py

      - name: Sync product images (Weave-first)
        run: cd _pipeline && python3 sync_images.py

      - name: Rebuild site (date-pinned probe)
        # Build against the committed sitemap date first: if nothing menu-visible
        # changed, the tree stays clean and we exit without a commit.
        run: |
          export BUILD_DATE=$(grep -o '<lastmod>[^<]*</lastmod>' sitemap.xml | head -1 | sed 's/<[^>]*>//g')
          echo "probe BUILD_DATE=$BUILD_DATE"
          cd _pipeline && python3 build_site.py

      - name: If changed, rebuild with today's date
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "CHANGED=0" >> "$GITHUB_ENV"
            echo "No menu changes -- site already current."
          else
            echo "CHANGED=1" >> "$GITHUB_ENV"
            export BUILD_DATE=$(date -u +%F)
            cd _pipeline && python3 build_site.py
          fi

      - name: Verify site (closed-loop gate)
        if: env.CHANGED == '1'
        run: python3 _pipeline/verify_site.py

      - name: Commit + deploy
        if: env.CHANGED == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "terps-menu-refresh"
          git config user.email "github-actions@users.noreply.github.com"
          git add -A
          git commit -m "auto-refresh: sync menu from Weave POS ($(date -u +'%Y-%m-%d %H:%MZ'))"
          git push
          # Pushes made with GITHUB_TOKEN do not fire on:push workflows --
          # dispatch the Pages deploy explicitly.
          gh workflow run pages.yml --ref main
